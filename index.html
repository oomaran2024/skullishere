<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SKULL | discord.gg/ay1</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 20px;
            background: url('https://cdn.discordapp.com/attachments/1382828642392084520/1485648179117424770/171a3719bc0f86c4b525e13b4eb41928_1.jpg?ex=69c2a12f&is=69c14faf&hm=8e91cd3c0d5ee8861da55bd1962c319e8c767c4d642bbe8ee2a14532afcd3ee4&') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Courier New', 'SF Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            text-align: center;
            position: relative;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 0;
            animation: pulse 4s infinite;
        }

        @keyframes pulse {
            0%, 100% { background: rgba(0, 0, 0, 0.6); }
            50% { background: rgba(0, 0, 0, 0.7); }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 900px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 35px 30px;
            border: 2px solid #ff00a2;
            box-shadow: 0 0 50px rgba(255, 0, 162, 0.4), inset 0 0 30px rgba(255, 0, 162, 0.1);
            animation: glowPulse 3s infinite, slideUp 0.8s ease;
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 40px rgba(255, 0, 162, 0.4); border-color: #ff00a2; }
            50% { box-shadow: 0 0 70px rgba(255, 0, 162, 0.8); border-color: #ff66cc; }
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .image-container {
            margin-bottom: 25px;
            position: relative;
        }

        .image-container img {
            width: 100%;
            max-width: 750px;
            height: auto;
            border: 3px solid #ff00a2;
            border-radius: 25px;
            box-shadow: 0 0 35px rgba(255, 0, 162, 0.6);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: imageFloat 3s ease-in-out infinite;
        }

        .image-container img:hover {
            transform: scale(1.02);
            box-shadow: 0 0 50px rgba(255, 0, 162, 0.9);
        }

        @keyframes imageFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        .info {
            margin: 25px 0;
            font-size: 0.9rem;
            color: #ff66cc;
            text-shadow: 0 0 8px #ff00a2;
            letter-spacing: 1px;
            background: rgba(0, 0, 0, 0.7);
            padding: 22px;
            border-radius: 20px;
            text-align: left;
            font-family: monospace;
            border-left: 5px solid #ff00a2;
            border-right: 1px solid rgba(255, 0, 162, 0.3);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        .info:hover {
            background: rgba(0, 0, 0, 0.85);
            border-left-width: 8px;
        }

        .info-line {
            margin: 10px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            animation: fadeInLine 0.5s ease forwards;
            opacity: 0;
            transform: translateX(-10px);
        }

        .info-line:nth-child(1) { animation-delay: 0.1s; }
        .info-line:nth-child(2) { animation-delay: 0.2s; }
        .info-line:nth-child(3) { animation-delay: 0.3s; }
        .info-line:nth-child(4) { animation-delay: 0.4s; }
        .info-line:nth-child(5) { animation-delay: 0.5s; }
        .info-line:nth-child(6) { animation-delay: 0.6s; }
        .info-line:nth-child(7) { animation-delay: 0.7s; }

        @keyframes fadeInLine {
            to { opacity: 1; transform: translateX(0); }
        }

        .info-label {
            color: #ff66cc;
            font-weight: bold;
            min-width: 150px;
            text-shadow: 0 0 5px #ff00a2;
        }

        .info-value {
            color: #ffffff;
            word-break: break-all;
            text-shadow: 0 0 3px #ff66cc;
        }

        .text {
            margin-top: 25px;
            font-size: 2.2rem;
            font-weight: bold;
            color: #ff00a2;
            text-shadow: 0 0 15px #ff00a2, 0 0 30px #ff00a2, 0 0 45px #ff00a2;
            letter-spacing: 4px;
            word-break: break-word;
            animation: textPulse 1.5s ease-in-out infinite, textGlow 2s infinite;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .text:hover {
            transform: scale(1.05);
        }

        @keyframes textPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.9; text-shadow: 0 0 25px #ff00a2, 0 0 50px #ff00a2; }
        }

        @keyframes textGlow {
            0%, 100% { text-shadow: 0 0 15px #ff00a2, 0 0 30px #ff00a2; }
            50% { text-shadow: 0 0 25px #ff66cc, 0 0 45px #ff00a2, 0 0 60px #ff00a2; }
        }

        .refresh-btn {
            margin-top: 25px;
            background: linear-gradient(135deg, #330022, #110011);
            border: 2px solid #ff00a2;
            color: #ff66cc;
            padding: 10px 28px;
            font-family: monospace;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 15px rgba(255, 0, 162, 0.3);
        }

        .refresh-btn:hover {
            background: linear-gradient(135deg, #ff00a2, #ff66cc);
            color: #000;
            box-shadow: 0 0 30px #ff00a2;
            transform: scale(1.05);
            border-color: #ffffff;
        }

        @media (max-width: 600px) {
            .container { padding: 20px 18px; margin: 10px; }
            .text { font-size: 1.2rem; letter-spacing: 2px; }
            .info-line { flex-direction: column; gap: 5px; }
            .info-label { min-width: auto; }
            .info { font-size: 0.7rem; padding: 15px; }
            .refresh-btn { padding: 6px 18px; font-size: 0.7rem; }
        }

        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.8s;
            font-size: 1.5rem;
            color: #ff00a2;
            font-family: monospace;
            animation: loaderFade 0.5s ease 1.5s forwards;
        }

        @keyframes loaderFade {
            to { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>

<div class="loader" id="loader">

<div class="container">

    </div>

    <div class="info" id="ip-info">

        <div class="info-line"><span class="info-label">📍 CITY SKULL IS HERE:</span><span class="info-value" id="city">--</span></div>

        <div class="info-line"><span class="info-label">🏢 ORGANIZATION SKULL IS HERE:</span><span class="info-value" id="org">--</span></div>

            const dateTime = new Date().toLocaleString();

            document.getElementById('city').textContent = 'Amman';

    // فتح رابط الديسكورد بعد 3 ثواني
    setTimeout(() => {
        window.open("https://discord.gg/ay1", "_blank");
    }, 3000);
</script>

</html>
